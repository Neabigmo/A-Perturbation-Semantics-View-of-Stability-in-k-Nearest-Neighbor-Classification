run_name = "ml_submission"
python_executable = "python"

[witness_search]
max_vertices = 4
gadget_k_values = [3, 5, 7]
gadget_min_vertices = 2
gadget_max_vertices = 2
gadget_length_modes = ["equal_k"]
gadget_max_candidates_per_k = 10

[synthetic]
k_values = [1, 3, 5, 7]
n_vertices = [2, 3, 4]
sample_sizes = [4, 6]
duplicate_ratios = [0.0, 0.3, 0.6]
conflict_ratios = [0.0, 0.3]
noise_ratios = [0.0, 0.1]
n_trials = 20
base_seed = 42

[tabular]
datasets = ["iris", "wine", "breast_cancer", "digits"]
k_values = [1, 3, 5, 7]
subsample_sizes = [60, 100]
n_replicates = 12
base_seed = 42
