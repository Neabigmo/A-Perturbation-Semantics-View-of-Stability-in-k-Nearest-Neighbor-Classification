<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recreated perturbation figures</title>
  <style>
    :root {
      --navy: #0b3769;
      --blue: #1f5b9f;
      --pale: #eef6ff;
      --red: #b0151a;
      --gold: #aa6500;
      --gray: #808894;
      --ink: #08172c;
    }
    body {
      margin: 0;
      background: #fbfaf7;
      color: var(--ink);
      font-family: "Times New Roman", Cambria, Georgia, serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 12px 24px;
      background: rgba(251, 250, 247, .93);
      border-bottom: 1px solid #d8d1c7;
      backdrop-filter: blur(8px);
    }
    header a {
      margin-right: 14px;
      color: var(--navy);
      text-decoration: none;
      font-weight: 700;
    }
    main {
      max-width: 1580px;
      margin: 0 auto;
      padding: 20px 18px 48px;
    }
    .figure-card {
      margin: 0 auto 34px;
      padding: 10px;
      background: #fffdfa;
      border: 1px solid #d7d2cb;
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(22, 36, 58, .08);
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #fffdf8;
    }
    .title {
      fill: var(--navy);
      font-weight: 700;
      font-size: 34px;
    }
    .subtitle {
      fill: var(--navy);
      font-style: italic;
      font-size: 24px;
    }
    .body {
      fill: var(--ink);
      font-size: 22px;
    }
    .small {
      fill: var(--ink);
      font-size: 17px;
    }
    .tiny {
      fill: var(--ink);
      font-size: 14px;
    }
    .math {
      font-style: italic;
    }
    .navy {
      fill: var(--navy);
      color: var(--navy);
    }
    .red {
      fill: var(--red);
      color: var(--red);
    }
    .gold {
      fill: var(--gold);
      color: var(--gold);
    }
    .muted {
      fill: #5e6875;
      color: #5e6875;
    }
  </style>
</head>
<body>
  <header>
    <a href="#fig1">Fig 1</a><a href="#fig2">Fig 2</a><a href="#fig3">Fig 3</a><a href="#fig4">Fig 4</a>
    <a href="#fig5">Fig 5</a><a href="#fig6">Fig 6</a><a href="#fig7">Fig 7</a><a href="#fig8">Fig 8</a>
    <a href="#fig9">Fig 9</a><a href="#fig10">Fig 10</a>
  </header>
  <main id="figures"></main>

<script>
const NS = "http://www.w3.org/2000/svg";
const C = { navy:"#0b3769", blue:"#1f5b9f", pale:"#eef6ff", red:"#b0151a", gold:"#aa6500", gray:"#7f8792", ink:"#08172c", line:"#9aa2ac" };
const main = document.getElementById("figures");

function svgEl(name, attrs = {}, parent) {
  const e = document.createElementNS(NS, name);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function makeFig(id, w=1536, h=1024) {
  const wrap = document.createElement("section");
  wrap.id = "fig" + id;
  wrap.className = "figure-card";
  const s = svgEl("svg", { viewBox:`0 0 ${w} ${h}`, role:"img", "aria-label":`Recreated figure ${id}` });
  wrap.appendChild(s);
  main.appendChild(wrap);
  defs(s);
  return s;
}
function defs(s) {
  const d = svgEl("defs", {}, s);
  svgEl("marker", { id:"arrow", viewBox:"0 0 10 10", refX:"9", refY:"5", markerWidth:"7", markerHeight:"7", orient:"auto-start-reverse" }, d)
    .appendChild(svgEl("path", { d:"M 0 0 L 10 5 L 0 10 z", fill:C.navy }));
  svgEl("marker", { id:"arrowGold", viewBox:"0 0 10 10", refX:"9", refY:"5", markerWidth:"7", markerHeight:"7", orient:"auto-start-reverse" }, d)
    .appendChild(svgEl("path", { d:"M 0 0 L 10 5 L 0 10 z", fill:C.gold }));
  svgEl("marker", { id:"arrowRed", viewBox:"0 0 10 10", refX:"9", refY:"5", markerWidth:"7", markerHeight:"7", orient:"auto-start-reverse" }, d)
    .appendChild(svgEl("path", { d:"M 0 0 L 10 5 L 0 10 z", fill:C.red }));
  const grad = svgEl("linearGradient", { id:"softBlue", x1:"0", x2:"1" }, d);
  svgEl("stop", { offset:"0", "stop-color":"#fafdff" }, grad);
  svgEl("stop", { offset:"1", "stop-color":"#eaf4ff" }, grad);
  const gold = svgEl("linearGradient", { id:"softGold", x1:"0", x2:"1" }, d);
  svgEl("stop", { offset:"0", "stop-color":"#fffdf8" }, gold);
  svgEl("stop", { offset:"1", "stop-color":"#fff0cf" }, gold);
}
function text(s, x, y, str, cls="body", anchor="start", color=null) {
  const t = svgEl("text", { x, y, class:cls, "text-anchor":anchor }, s);
  if (color) t.setAttribute("fill", color);
  String(str).split("\n").forEach((line, i) => {
    const sp = svgEl("tspan", { x, dy:i ? "1.2em" : 0 }, t);
    sp.textContent = line;
  });
  return t;
}
function htmlText(s, x, y, w, h, html, fs=22, color=C.ink, align="left") {
  const fo = svgEl("foreignObject", { x, y, width:w, height:h }, s);
  const div = document.createElement("div");
  div.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
  div.style.cssText = `font-family:Times New Roman,Cambria,serif;font-size:${fs}px;line-height:1.25;color:${color};text-align:${align};`;
  div.innerHTML = html;
  fo.appendChild(div);
  return fo;
}
function line(s, x1, y1, x2, y2, color=C.navy, sw=2, arrow=false, dash=null) {
  const a = { x1, y1, x2, y2, stroke:color, "stroke-width":sw, fill:"none" };
  if (arrow) a["marker-end"] = arrow === "gold" ? "url(#arrowGold)" : arrow === "red" ? "url(#arrowRed)" : "url(#arrow)";
  if (dash) a["stroke-dasharray"] = dash;
  return svgEl("line", a, s);
}
function path(s, d, color=C.navy, sw=2, arrow=false, fill="none", dash=null) {
  const a = { d, stroke:color, "stroke-width":sw, fill };
  if (arrow) a["marker-end"] = arrow === "gold" ? "url(#arrowGold)" : arrow === "red" ? "url(#arrowRed)" : "url(#arrow)";
  if (dash) a["stroke-dasharray"] = dash;
  return svgEl("path", a, s);
}
function rect(s, x, y, w, h, stroke=C.navy, fill="none", rx=7, sw=1.8, dash=null) {
  const a = { x, y, width:w, height:h, rx, fill, stroke, "stroke-width":sw };
  if (dash) a["stroke-dasharray"] = dash;
  return svgEl("rect", a, s);
}
function circle(s, cx, cy, r, stroke=C.navy, fill="none", sw=1.8, dash=null) {
  const a = { cx, cy, r, fill, stroke, "stroke-width":sw };
  if (dash) a["stroke-dasharray"] = dash;
  return svgEl("circle", a, s);
}
function sampleBox(s, x, y, label, w=88, h=62, opts={}) {
  rect(s, x, y, w, h, opts.stroke || C.navy, opts.fill || "#fff", 7, opts.sw || 1.6, opts.dash);
  htmlText(s, x+6, y+h/2-14, w-12, 35, label, opts.fs || 19, opts.color || C.ink, "center");
}
function pill(s, x, y, w, h, label, stroke=C.navy, fill="#fff", fs=24) {
  rect(s, x, y, w, h, stroke, fill, 6, 1.8);
  htmlText(s, x+8, y+h/2-14, w-16, 36, label, fs, stroke, "center");
}
function dot(s, x, y, label, color=C.blue, fill="#dcecff", r=10) {
  circle(s, x, y, r, color, fill, 1.8);
  if (label !== undefined) text(s, x, y+34, label, "small", "middle", color);
}
function titleLine(s, y, label) {
  line(s, 58, y, 300, y, C.navy, 3);
  circle(s, 58, y, 6, C.navy, C.navy);
  text(s, 768, y+10, label, "title", "middle");
  line(s, 1236, y, 1476, y, C.navy, 3);
  circle(s, 1476, y, 6, C.navy, C.navy);
}
function brace(s, x1, y, x2, color=C.navy) {
  path(s, `M${x1},${y} C${x1+20},${y+24} ${x2-20},${y+24} ${x2},${y}`, color, 1.7);
}

function drawFig1() {
  const s = makeFig(1);

  xs.forEach((x,i)=>{ text(s, x+45, 48, ["1","2","i","n − 1","n"][i], "small", "middle"); sampleBox(s,x,62,labs[i], i===3?138:98,70,{fill:i===2?"url(#softBlue)":"#fff"}); });
  text(s, 615, 114, "⋯", "title"); text(s, 778, 114, "⋯", "title");
  line(s, 367, 148, 1125, 148, C.navy, 2, true); text(s, 720, 178, "ordered occurrences", "subtitle", "middle");
  rect(s, 1210, 18, 282, 188, C.gray, "none", 18, 1.5, "7 7");
  text(s, 1360, 52, "Two conceptual axes", "body", "middle");
  circle(s, 1250, 88, 14, C.navy, "#eaf4ff"); htmlText(s, 1280, 72, 190, 55, "Sample operation<br/>(what changes in <i>S</i>)", 20);
  circle(s, 1250, 153, 14, C.gold, "#fff"); htmlText(s, 1280, 138, 190, 52, "Evaluation point<br/>(where we evaluate)", 20);
  htmlText(s, 30, 280, 100, 70, "Sample<br/>operation", 26, C.navy, "center"); line(s, 78, 358, 78, 503, C.navy, 2, true);
  text(s, 68, 542, "− and −", "subtitle", "middle", "#54545b"); line(s, 78, 564, 78, 678, C.gold, 2, true);
  htmlText(s, 20, 705, 118, 70, "Evaluation<br/>point", 26, C.gold, "center");
  const rows = [
    ["−", "Delete-one", 224, C.navy, "arbitrary<br/>(x, y)", "delete <i>one</i> occurrence,<br/>then evaluate an<br/>arbitrary query-label<br/>pair (x, y)", C.gold],
    ["+", "Add-one", 405, C.navy, "arbitrary<br/>(x, y)", "append <i>one</i> occurrence,<br/>then evaluate an<br/>arbitrary query-label<br/>pair (x, y)", C.gold],
    ["⟳", "Replace-one", 574, C.navy, "arbitrary<br/>(x, y)", "replace <i>one</i> occurrence,<br/>then evaluate an<br/>arbitrary query-label<br/>pair (x, y)", C.gold],
    ["◕", "LOO", 733, C.red, "deleted<br/>occurrence<br/>(xᵢ, yᵢ)", "delete <i>one</i> occurrence,<br/>then evaluate at<br/>the deleted occurrence<br/><i>itself</i>", C.red]
  ];
  rows.forEach((r, idx) => {
    const y = r[2]; rect(s, 150, y, 1355, idx===3?208:170, "#aeb1b7", "none", 12, 1.4);
    circle(s, 190, y+70, 26, r[3], idx===3?"#fff":"#eef6ff", 2.5); text(s, 190, y+82, r[0], "title", "middle", r[3]);
    text(s, 234, y+80, r[1], "title", "start", r[3]);
    line(s, 367, y+10, 367, y+160, C.gray, 1.2, false, "6 6"); line(s, 1040, y+10, 1040, y+160, C.gray, 1.2, false, "6 6");
    const bx = [390, 495, 645, 785, 920]; const labels = ["(x₁, y₁)","(x₂, y₂)","", "(xₙ₋₁, yₙ₋₁)","(xₙ, yₙ)"];
    bx.forEach((x,i)=>{ if(i===2 && idx===1) sampleBox(s,x,y+58,"(xᵢ, yᵢ)",78,62,{fill:"url(#softBlue)"}); else if(i===2 && idx===2) sampleBox(s,x,y+48,"z =<br/>(x, y)",78,70,{fill:"url(#softBlue)",color:C.navy}); else if(i===2) sampleBox(s,x,y+58,"",70,62,{stroke:C.red,dash:"6 5"}); else sampleBox(s,x,y+58,labels[i], i===3?126:90,62); });
    text(s, 620, y+96, "⋯", "title"); text(s, 738, y+96, "⋯", "title");
    if(idx===1) sampleBox(s,960,y+50,"z =<br/>(x, y)",58,80,{fill:"url(#softBlue)",color:C.navy});
    line(s, 1056, y+78, 1106, y+78, r[6], 4, r[6]===C.red?"red":"gold");
    circle(s, 1173, y+78, idx===3?62:47, r[6], "#fff", 1.5, "5 4"); htmlText(s, 1124, y+44, 96, idx===3?90:65, r[4], 20, r[6], "center");
    htmlText(s, 1263, y+32, 220, 112, r[5], 25, C.ink);
  });
  line(s, 688, 847, 1180, 847, C.red, 2); line(s, 688, 847, 688, 800, C.red, 2, "red"); line(s, 1180, 847, 1180, 805, C.red, 2);
  htmlText(s, 700, 862, 520, 34, "evaluation point is tied to the removed occurrence (special case)", 20, C.red, "center");
  titleLine(s, 960, "Perturbation notions differ by both operation on the sample and evaluation point.");
}

function drawFig2() {

  function panel(x, title, right=false) {
    rect(s, x, 24, 680, 850, C.gray, "none", 10, 1.6);
    text(s, x+340, 72, title, "title", "middle");
    text(s, x+340, 116, "Two-vertex graph metric:  d(a,b) = 1", "subtitle", "middle");
    rect(s, x+158, 148, 360, 95, C.navy, "none", 6, 1.4);
    htmlText(s, x+210, 165, 270, 60, "Query:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <i>x = a</i><br/>Evaluation:&nbsp; <i>y = 0</i>", 25);
    text(s, x+340, 286, "Ordered sample occurrences", "subtitle", "middle");
    const c1 = right ? C.red : C.navy; const f1 = right ? "#fff" : "#eaf4ff";
    text(s, x+170, 328, "1", "small", "middle"); text(s, x+510, 328, "2", "small", "middle");
    circle(s, x+170, 385, 36, c1, f1, 2); text(s, x+170, 397, right?"1":"0", "title", "middle", c1);
    circle(s, x+510, 385, 36, C.navy, "#eaf4ff", 2); text(s, x+510, 397, "0", "title", "middle");
    line(s, x+206, 385, x+474, 385, C.navy, 2); text(s, x+340, 365, "d(a,b) = 1", "small", "middle");
    text(s, x+170, 455, "a", "title", "middle"); text(s, x+510, 455, "b", "title", "middle");
    rect(s, x+24, 486, 632, 100, C.navy, "#fff", 4, 1.5);
    htmlText(s, x+52, 505, 580, 70, right ? "Nearest occurrence to <i>a</i> is #1 (at <i>a</i>) with label 1.<br/><b>Deterministic 1-NN prediction at <i>x = a</i>:</b> &nbsp;ŷ<sub>S¹←(a,1)</sub>(a) = <b style='color:#b0151a'>1</b>." : "Nearest occurrence to <i>a</i> is #1 (at <i>a</i>) with label 0.<br/><b>Deterministic 1-NN prediction at <i>x = a</i>:</b> &nbsp;ŷ<sub>S</sub>(a) = 0.", 24);
    if (!right) {
      rect(s, x+24, 610, 632, 154, C.gray, "none", 8, 1.3, "6 5");
      htmlText(s, x+70, 624, 560, 118, "✓ &nbsp;<b style='color:#aa6500'>LOO</b> at occurrence <i>a</i> (remove #1):<br/>remaining neighbor is <i>b</i> with label 0 → correct (0).<br/>✓ &nbsp;<b style='color:#aa6500'>LOO</b> at occurrence <i>b</i> (remove #2):<br/>remaining neighbor is <i>a</i> with label 0 → correct (0).", 23);
      pill(s, x+62, 792, 604, 70, "Δₗₒₒ(S, 1) = 0, &nbsp;&nbsp; Δₗₒₒ(S, 2) = 0.", C.navy, "url(#softBlue)", 30);
    } else {
      rect(s, x+70, 628, 540, 110, C.red, "none", 8, 1.3, "6 5");
      htmlText(s, x+112, 646, 470, 70, "Prediction flips from 0 to 1 at <i>x = a</i>:<br/><span style='font-size:32px'>0 &nbsp; → &nbsp; <b style='color:#b0151a'>1</b></span>", 24, C.ink, "center");
      pill(s, x+38, 792, 620, 70, "Δᵣₑₚ(S, 1, (a,1), a, 0) = 1.", C.red, "#fff6f2", 32);
    }
  }
  panel(30, "Original sample S");
  line(s, 725, 397, 790, 397, C.navy, 2, true);
  panel(808, "Replace-one sample S¹←(a,1)", true);
  titleLine(s, 944, "Pointwise LOO stability does not control pointwise replace-one stability.");
  text(s, 768, 1010, "Two-vertex graph metric; deterministic 1-NN; explicit witness.", "subtitle", "middle");
}

  const s = makeFig(3);
  const starts = [18, 552, 1032], headings = ["1. Original sample S", "2. Delete i-th occurrence: S⁻ⁱ", "3. Add new occurrence z at the end: S⁻ⁱ ⊕ z"];

    text(s, x+182, y+41, "⋯", "title"); if(idx<2) text(s, x+300, y+41, "⋯", "title");

  });

  rect(s, 1088, 15, 404, 104, C.navy, "none", 9, 1.7, "6 5");

  rect(s, 1070, 612, 415, 330, C.red, "none", 18, 1.5, "6 5");
  circle(s, 1132, 692, 42, C.red, "#fff"); text(s, 1200, 684, "LOO is different:", "title", "start", C.red);
  htmlText(s, 1200, 722, 230, 150, "the evaluation point is<br/>tied to the deleted<br/>occurrence, so this<br/>decomposition does not<br/>apply directly.", 27);
  line(s, 48, 872, 932, 872, C.gray, 1);
  text(s, 40, 918, "• Implication (uniform bounds)", "title");
  pill(s, 52, 944, 890, 74, "uniform replace-one  ≤  uniform delete-one  +  uniform add-one", C.navy, "#fff", 29);
}

function drawFig4() {
  const s = makeFig(4);
